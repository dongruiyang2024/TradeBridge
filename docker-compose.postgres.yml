services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      # 使用本地目录映射，便于迁移
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=wait9yan
      - POSTGRES_PASSWORD=Weite123
      - POSTGRES_DB=tradebridge
      - PGDATA=/var/lib/postgresql/data
      - TZ=Asia/Shanghai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wait9yan -d tradebridge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
