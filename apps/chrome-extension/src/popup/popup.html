<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>TradeBridge</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <h1>TradeBridge</h1>
          <p id="account" class="account">未激活</p>
        </div>
        <span id="headline" class="status-pill">未启动</span>
      </header>

      <section class="status-panel" aria-label="采集状态">
        <p id="account-validation">账号校验：未验证</p>
        <p id="realtime">实时连接：未启动</p>
        <p id="sync">最近同步：未同步</p>
        <p id="capture">抓取诊断：未抓取</p>
        <p id="history">历史回补：暂无诊断</p>
        <p id="error">最近错误：无</p>
      </section>

      <nav class="actions" aria-label="快捷操作">
        <button id="reconnect" class="primary" type="button" hidden>重新连接</button>
        <button id="open-options" type="button">设置</button>
      </nav>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
