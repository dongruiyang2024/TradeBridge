<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>TradeBridge 设置</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="options-shell">
      <header>
        <h1>Trade-Mind 插件设置</h1>
        <p>连接 Trade-Mind 并激活 OneTalk 采集端</p>
      </header>

      <form id="options-form">
        <section class="settings-panel" aria-label="连接配置">
          <div class="readonly-row">
            <span>服务连接</span>
            <strong id="server-url">自动连接 TradeBridge 服务</strong>
          </div>

          <label>
            <span>Trade-Mind 激活码</span>
            <input name="activationToken" type="text" autocomplete="one-time-code" placeholder="从 Trade-Mind 沟通页复制" required />
          </label>

          <div class="field-row">
            <div class="readonly-row">
              <span>OneTalk Login ID</span>
              <strong id="detected-login-id">保存时自动检测</strong>
            </div>
            <div class="readonly-row">
              <span>OneTalk Ali ID</span>
              <strong id="detected-ali-id">保存时自动检测</strong>
            </div>
          </div>

          <div class="field-row">
            <div class="readonly-row">
              <span>同步间隔</span>
              <strong>同步间隔固定为 10 秒</strong>
            </div>
            <label>
              <span>每会话回补条数</span>
              <input name="historyMessagesPerConversation" type="number" min="1" max="100" step="1" value="20" />
            </label>
          </div>

          <label class="checkbox-row">
            <input name="historyBackfillEnabled" type="checkbox" checked />
            <span>启用历史消息回补</span>
          </label>
        </section>

        <section class="status-panel" aria-label="当前状态">
          <p><span>当前账号</span><strong id="current-account">未激活</strong></p>
          <p><span>采集设备</span><strong id="current-device">未创建</strong></p>
          <p><span>设备 ID</span><strong id="current-device-id">未创建</strong></p>
        </section>

        <p class="security-note">只填写 Trade-Mind 激活码；不要填写 OneTalk 密码、Cookie 或 Token。保存前请先打开并登录 OneTalk 页面。</p>
        <button type="submit">保存并激活</button>
      </form>

      <p id="options-status"></p>
    </main>
    <script type="module" src="./options.ts"></script>
  </body>
</html>
